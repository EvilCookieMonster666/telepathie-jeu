<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Télépathie</title>
  <style>
    :root{color-scheme:light dark;--ink:#202332;--paper:#faf7f2;--accent:#7048e8;--line:#d9d5cf}*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font:16px system-ui,-apple-system,sans-serif}.app{max-width:680px;margin:auto;padding:24px 18px 48px}.card{background:color-mix(in srgb,var(--paper) 90%,white);border:1px solid var(--line);border-radius:18px;padding:20px;margin:14px 0}h1{margin:0;font-size:2rem}h2{margin-top:0}.muted{opacity:.7}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.symbol{width:190px;height:190px;margin:18px auto;display:block}.center{text-align:center}input,select,button{font:inherit;padding:12px;border-radius:10px;border:1px solid var(--line);width:100%;margin:5px 0 14px}button{background:var(--accent);color:white;border:0;font-weight:700;cursor:pointer}button.secondary{background:transparent;color:var(--ink);border:1px solid var(--line)}.notice{padding:12px;background:color-mix(in srgb,var(--accent) 12%,transparent);border-radius:10px}.history{font-size:.9rem;border-top:1px solid var(--line);padding:10px 0}.good{color:#177245;font-weight:700}.bad{color:#b42318;font-weight:700}@media(max-width:480px){.row{grid-template-columns:1fr}.app{padding:18px 14px}}
  </style>
</head>
<body><main class="app" id="app"><p>Chargement…</p></main>
<script>
const API='https://knjrcbkulwgllwcaflkx.supabase.co/rest/v1/',KEY='sb_publishable_P5tKcoGNgkTL0B-zesYs0w_wWnZytjs';
function query(table,method='GET',body){let filters=[],sort='',single=false,want=false;const run=async()=>{try{let url=API+table+(filters.length?'?'+filters.join('&'):'')+(sort?(filters.length?'&':'?')+'order='+encodeURIComponent(sort):'');let headers={apikey:KEY,Authorization:'Bearer '+KEY};if(body!==undefined){headers['Content-Type']='application/json';headers.Prefer=want?'return=representation':'return=minimal'}let r=await fetch(url,{method,headers,body:body===undefined?undefined:JSON.stringify(body)}),text=await r.text(),data=text?JSON.parse(text):null;if(!r.ok)throw new Error(data?.message||r.statusText);return {data:single?(Array.isArray(data)?data[0]||null:data):data,error:null}}catch(error){return {data:null,error}}};const b={eq(k,v){filters.push(encodeURIComponent(k)+'=eq.'+encodeURIComponent(v));return b},order(k){sort=k;return b},single(){single=true;return b},select(){want=true;return b},then(resolve,reject){return run().then(resolve,reject)}};return b}
const supabase={from(table){return {select(){return query(table)},insert(body){return query(table,'POST',body)},update(body){return query(table,'PATCH',body)}}}};
const app=document.querySelector('#app');
const sets={1:[['cercle','triangle','carré'],['rouge','bleu','jaune']],2:[['cercle','triangle','carré','étoile'],['rouge','bleu','jaune','vert']],3:[['cercle','triangle','carré','étoile','cœur'],['rouge','bleu','jaune','vert','orange']],4:[['cercle','triangle','carré','étoile','cœur','hexagone'],['rouge','bleu','jaune','vert','orange','mauve']],5:[['cercle','triangle','carré','étoile','cœur','hexagone','losange','croix'],['rouge','bleu','jaune','vert','orange','mauve','rose','cyan']]};
const colors={rouge:'#d64141',bleu:'#3478d4',jaune:'#d9a800',vert:'#2e9658',orange:'#d86f26',mauve:'#8653ad'};
let session=null,data=null,solo=null,draftGuess={shape:'',color:''},isGuessing=false;try{session=JSON.parse(localStorage.getItem('telepathie-session')||'null')}catch(e){localStorage.removeItem('telepathie-session')}
const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function svg(shape,color){const f=colors[color]||'#c9407d',p={cercle:'<circle cx="80" cy="80" r="55"/>',triangle:'<path d="M80 18 145 140 15 140Z"/>',carré:'<rect x="27" y="27" width="106" height="106" rx="4"/>',étoile:'<path d="M80 14 96 59 144 59 105 87 120 135 80 107 40 135 55 87 16 59 64 59Z"/>',cœur:'<path d="M80 138C30 105 21 76 30 51c10-26 41-23 50 3 9-26 40-29 50-3 9 25 0 54-50 87Z"/>',hexagone:'<path d="M80 15 137 48 137 112 80 145 23 112 23 48Z"/>',losange:'<path d="M80 15 145 80 80 145 15 80Z"/>',croix:'<path d="M54 20h52v34h34v52h-34v34H54v-34H20V54h34Z"/>'}[shape]||'';return `<svg class="symbol" viewBox="0 0 160 160" aria-label="${shape} ${color}"><g fill="${f}">${p}</g></svg>`}
function chance(){let [a,b]=sets[data.game.level];return 1/(a.length*b.length)}
function code(){return Math.random().toString(36).slice(2,8).toUpperCase()}
function levelOptions(){return [1,2,3,4,5].map(n=>{let [sh,co]=sets[n];return `<option value="${n}">${n} — ${sh.length*co.length} images</option>`}).join('')}
function randomSymbol(level){let [sh,co]=sets[level];return {shape:sh[Math.floor(Math.random()*sh.length)],color:co[Math.floor(Math.random()*co.length)]}}
async function load(){if(!session)return lobby();let g=await supabase.from('games').select('*').eq('id',session.gameId).single();let ps=await supabase.from('game_players').select('*').eq('game_id',session.gameId).order('player_number');let ts=await supabase.from('transmissions').select('*').eq('game_id',session.gameId).order('turn_number');if(g.error||ps.error||ts.error){localStorage.removeItem('telepathie-session');session=null;return lobby()}data={game:g.data,players:ps.data,transmissions:ts.data};render()}
function lobby(){solo=null;app.innerHTML=`<h1>Télépathie</h1><p class="muted">Jeu de transmissions, en solo ou à deux à distance.</p><section class="card"><h2>Jouer en solo</h2><p class="muted">Découvrez un symbole, masquez-le, puis testez votre intuition.</p><label>Votre prénom<input id="soloName" maxlength="24"></label><div class="row"><label>Niveau<select id="soloLevel">${levelOptions()}</select></label><label>Essais<input id="soloRounds" type="number" min="1" max="100" value="10"></label></div><button id="solo">Commencer en solo</button></section><section class="card"><h2>Créer une partie à deux</h2><label>Votre prénom<input id="createName" maxlength="24"></label><div class="row"><label>Niveau<select id="level">${levelOptions()}</select></label><label>Transmissions<input id="rounds" type="number" min="2" max="100" value="10"></label></div><button id="create">Créer un code</button></section><section class="card"><h2>Rejoindre une partie</h2><label>Votre prénom<input id="joinName" maxlength="24"></label><label>Code de la partie<input id="joinCode" maxlength="6" placeholder="ABC123" style="text-transform:uppercase"></label><button id="join" class="secondary">Rejoindre</button></section>`;document.querySelector('#solo').onclick=startSolo;document.querySelector('#create').onclick=create;document.querySelector('#join').onclick=join}
async function create(){let name=document.querySelector('#createName').value.trim()||'Joueur 1',level=+document.querySelector('#level').value,total=Math.max(2,Math.min(100,+document.querySelector('#rounds').value||10));let game;for(let i=0;i<4;i++){let r=await supabase.from('games').insert({code:code(),level,total_turns:total,status:'waiting'}).select().single();if(!r.error){game=r.data;break}}if(!game)return alert('Impossible de créer la partie. Réessaie.');let r=await supabase.from('game_players').insert({game_id:game.id,player_number:1,player_name:name});if(r.error)return alert(r.error.message);session={gameId:game.id,number:1};localStorage.setItem('telepathie-session',JSON.stringify(session));load()}
async function join(){let name=document.querySelector('#joinName').value.trim()||'Joueur 2',c=document.querySelector('#joinCode').value.trim().toUpperCase();let r=await supabase.from('games').select('*').eq('code',c).eq('status','waiting').single();if(r.error)return alert('Code introuvable ou partie déjà commencée.');let p=await supabase.from('game_players').insert({game_id:r.data.id,player_number:2,player_name:name});if(p.error)return alert('Cette partie a déjà deux joueurs.');await supabase.from('games').update({status:'playing'}).eq('id',r.data.id);session={gameId:r.data.id,number:2};localStorage.setItem('telepathie-session',JSON.stringify(session));load()}
function render(){let me=data.players.find(p=>p.player_number===session.number),other=data.players.find(p=>p.player_number!==session.number);if(data.game.status==='waiting')return app.innerHTML=`<h1>Télépathie</h1><section class="card center"><h2>Partie créée</h2><p>Envoyez ce code à votre amie :</p><h1>${data.game.code}</h1><p class="muted">En attente de ${esc(other?.player_name||'la deuxième joueuse')}…</p><button class="secondary" id="quit">Quitter</button></section>`,document.querySelector('#quit').onclick=quit;let t=data.transmissions.find(x=>x.turn_number===data.game.current_turn);if(data.game.status==='finished')return results();if(!t){if(session.number!==((data.game.current_turn%2)+1))return waiting('Votre partenaire prépare la transmission.');return transmitter(me,other)}if(!t.guessed_shape){if(session.number===t.sender_number)return waiting('Image transmise. Votre partenaire formule maintenant son hypothèse.',t);return guess(me,t)}return reveal(t,me,other)}
function waiting(text,t){app.innerHTML=`<h1>Télépathie</h1><section class="card center">${t&&session.number===t.sender_number?svg(t.sent_shape,t.sent_color):''}<h2>Patientez un instant</h2><p>${text}</p><p class="muted">Cette page se met à jour automatiquement.</p></section>`}
function transmitter(me,other){let n=data.game.current_turn+1;app.innerHTML=`<h1>Télépathie</h1><p class="muted">Transmission ${n} sur ${data.game.total_turns}</p><section class="card center"><h2>${esc(me.player_name)}, c’est votre tour de transmettre</h2><p>Assurez-vous que ${esc(other.player_name)} ne regarde pas votre écran.</p><button id="send">Afficher mon image</button></section>`;document.querySelector('#send').onclick=async()=>{let [sh,co]=sets[data.game.level],shape=sh[Math.floor(Math.random()*sh.length)],color=co[Math.floor(Math.random()*co.length)];let r=await supabase.from('transmissions').insert({game_id:data.game.id,turn_number:data.game.current_turn,sender_number:session.number,receiver_number:other.player_number,sent_shape:shape,sent_color:color});if(r.error)return alert(r.error.message);load()}}
function guess(me,t){let [sh,co]=sets[data.game.level];isGuessing=true;if(!draftGuess.shape)draftGuess={shape:sh[0],color:co[0]};app.innerHTML=`<h1>Télépathie</h1><p class="muted">Transmission ${t.turn_number+1} sur ${data.game.total_turns}</p><section class="card"><h2>${esc(me.player_name)}, quelle est votre hypothèse ?</h2><p class="notice">Le symbole n’est pas affiché. Choisissez votre réponse avant de voir le résultat.</p><div class="row"><label>Forme<select id="shape">${sh.map(x=>`<option ${x===draftGuess.shape?'selected':''}>${x}</option>`).join('')}</select></label><label>Couleur<select id="color">${co.map(x=>`<option ${x===draftGuess.color?'selected':''}>${x}</option>`).join('')}</select></label></div><button id="answer">Valider mon hypothèse</button></section>`;document.querySelector('#shape').onchange=e=>draftGuess.shape=e.target.value;document.querySelector('#color').onchange=e=>draftGuess.color=e.target.value;document.querySelector('#answer').onclick=async()=>{isGuessing=false;let shape=document.querySelector('#shape').value,color=document.querySelector('#color').value,success=shape===t.sent_shape&&color===t.sent_color;let u=await supabase.from('transmissions').update({guessed_shape:shape,guessed_color:color,success,answered_at:new Date().toISOString()}).eq('id',t.id);if(u.error)return alert(u.error.message);if(success)await supabase.from('game_players').update({score:data.players.find(p=>p.player_number===t.sender_number).score+1}).eq('game_id',data.game.id).eq('player_number',t.sender_number);draftGuess={shape:'',color:''};load()}}
function reveal(t,me,other){let success=t.success,last=t.turn_number+1>=data.game.total_turns,canAdvance=session.number===t.receiver_number;app.innerHTML=`<h1>Télépathie</h1><section class="card center"><h2 class="${success?'good':'bad'}">${success?'Transmission réussie !':'Transmission non réussie'}</h2>${svg(t.sent_shape,t.sent_color)}<p>Image : <strong>${t.sent_shape} ${t.sent_color}</strong><br>Hypothèse : <strong>${t.guessed_shape} ${t.guessed_color}</strong></p><p>${success?`${esc(data.players.find(p=>p.player_number===t.sender_number).player_name)} gagne 1 point.`:'Aucun point cette fois.'}</p>${canAdvance?`<button id="advance">${last?'Voir les résultats':'Transmission suivante'}</button>`:`<p class="muted">Votre partenaire passe à la suite.</p>`}</section>`;if(canAdvance)document.querySelector('#advance').onclick=async()=>{await supabase.from('games').update({current_turn:t.turn_number+1,status:last?'finished':'playing'}).eq('id',data.game.id);load()}}
function startSolo(){let name=document.querySelector('#soloName').value.trim()||'Joueur',level=+document.querySelector('#soloLevel').value,total=Math.max(1,Math.min(100,+document.querySelector('#soloRounds').value||10));solo={name,level,total,turn:0,score:0,records:[],symbol:randomSymbol(level),phase:'guess'};soloRender()}
function soloRender(){let s=solo,n=s.turn+1;if(s.phase==='see'){app.innerHTML=`<h1>Télépathie — solo</h1><p class="muted">Essai ${n} sur ${s.total}</p><section class="card center"><h2>${esc(s.name)}, mémorisez ce symbole</h2>${svg(s.symbol.shape,s.symbol.color)}<button id="hide">Masquer l’image et répondre</button></section>`;document.querySelector('#hide').onclick=()=>{s.phase='guess';soloRender()};return}if(s.phase==='guess'){let [sh,co]=sets[s.level];app.innerHTML=`<h1>Télépathie — solo</h1><p class="muted">Essai ${n} sur ${s.total}</p><section class="card"><h2>Quelle est votre hypothèse ?</h2><p class="notice">L’image est maintenant cachée. Faites votre choix, puis validez pour découvrir la réponse.</p><div class="row"><label>Forme<select id="soloShape">${sh.map(x=>`<option>${x}</option>`).join('')}</select></label><label>Couleur<select id="soloColor">${co.map(x=>`<option>${x}</option>`).join('')}</select></label></div><button id="soloAnswer">Valider mon hypothèse</button></section>`;document.querySelector('#soloAnswer').onclick=()=>{let shape=document.querySelector('#soloShape').value,color=document.querySelector('#soloColor').value,success=shape===s.symbol.shape&&color===s.symbol.color;s.records.push({shape,color,sentShape:s.symbol.shape,sentColor:s.symbol.color,success});if(success)s.score++;s.phase='reveal';soloRender()};return}if(s.phase==='reveal'){let r=s.records.at(-1),last=s.turn+1>=s.total;app.innerHTML=`<h1>Télépathie — solo</h1><section class="card center"><h2 class="${r.success?'good':'bad'}">${r.success?'Bonne réponse !':'Réponse différente'}</h2>${svg(r.sentShape,r.sentColor)}<p>Image : <strong>${r.sentShape} ${r.sentColor}</strong><br>Hypothèse : <strong>${r.shape} ${r.color}</strong></p><button id="soloNext">${last?'Voir mes résultats':'Essai suivant'}</button></section>`;document.querySelector('#soloNext').onclick=()=>{if(last){s.phase='results'}else{s.turn++;s.symbol=randomSymbol(s.level);s.phase='see'}soloRender()};return}let p=1/(sets[s.level][0].length*sets[s.level][1].length),pct=s.score/s.total;app.innerHTML=`<h1>Résultats solo</h1><section class="card center"><h2>${s.score} réussite${s.score!==1?'s':''} sur ${s.total} — ${(pct*100).toFixed(1)} %</h2><p>Hasard attendu : ${(p*100).toFixed(1)} % par essai.</p></section><section class="card"><h2>Détail</h2>${s.records.map((r,i)=>`<div class="history">${i+1}. Image : ${r.sentShape} ${r.sentColor} · Hypothèse : ${r.shape} ${r.color} · <strong>${r.success?'réussite':'non'}</strong></div>`).join('')}</section><button class="secondary" id="home">Retour à l’accueil</button>`;document.querySelector('#home').onclick=lobby}
function soloRender(){let s=solo,n=s.turn+1;if(s.phase==='guess'){let [sh,co]=sets[s.level];app.innerHTML=`<h1>Télépathie — solo</h1><p class="muted">Essai ${n} sur ${s.total}</p><section class="card"><h2>${esc(s.name)}, quelle est votre hypothèse ?</h2><p class="notice">Choisissez une forme et une couleur avant de découvrir l’image générée.</p><div class="row"><label>Forme<select id="soloShape">${sh.map(x=>`<option>${x}</option>`).join('')}</select></label><label>Couleur<select id="soloColor">${co.map(x=>`<option>${x}</option>`).join('')}</select></label></div><button id="soloAnswer">Valider mon hypothèse</button></section>`;document.querySelector('#soloAnswer').onclick=()=>{let shape=document.querySelector('#soloShape').value,color=document.querySelector('#soloColor').value,success=shape===s.symbol.shape&&color===s.symbol.color;s.records.push({shape,color,sentShape:s.symbol.shape,sentColor:s.symbol.color,success});if(success)s.score++;s.phase='reveal';soloRender()};return}if(s.phase==='reveal'){let r=s.records.at(-1),last=s.turn+1>=s.total;app.innerHTML=`<h1>Télépathie — solo</h1><section class="card center"><h2 class="${r.success?'good':'bad'}">${r.success?'Bonne réponse !':'Réponse différente'}</h2>${svg(r.sentShape,r.sentColor)}<p>Image : <strong>${r.sentShape} ${r.sentColor}</strong><br>Hypothèse : <strong>${r.shape} ${r.color}</strong></p><button id="soloNext">${last?'Voir mes résultats':'Essai suivant'}</button></section>`;document.querySelector('#soloNext').onclick=()=>{if(last){s.phase='results'}else{s.turn++;s.symbol=randomSymbol(s.level);s.phase='guess'}soloRender()};return}let p=1/(sets[s.level][0].length*sets[s.level][1].length),pct=s.score/s.total;app.innerHTML=`<h1>Résultats solo</h1><section class="card center"><h2>${s.score} réussite${s.score!==1?'s':''} sur ${s.total} — ${(pct*100).toFixed(1)} %</h2><p>Hasard attendu : ${(p*100).toFixed(1)} % par essai.</p></section><section class="card"><h2>Détail</h2>${s.records.map((r,i)=>`<div class="history">${i+1}. Image : ${r.sentShape} ${r.sentColor} · Hypothèse : ${r.shape} ${r.color} · <strong>${r.success?'réussite':'non'}</strong></div>`).join('')}</section><button class="secondary" id="home">Retour à l’accueil</button>`;document.querySelector('#home').onclick=lobby}
function results(){let total=data.transmissions.filter(t=>t.success).length,p=chance(),pct=total/data.game.total_turns,tail=binomial(data.game.total_turns,total,p),scores=data.players.map(p=>`<p><strong>${esc(p.player_name)}</strong> : ${p.score} point${p.score!==1?'s':''}</p>`).join('');app.innerHTML=`<h1>Partie terminée</h1><section class="card center">${scores}<hr><h2>${total} réussite${total!==1?'s':''} sur ${data.game.total_turns} — ${(pct*100).toFixed(1)} %</h2><p>Hasard attendu : ${(p*100).toFixed(1)} % par transmission.</p><p>${pct>p?`Au-dessus du hasard. Obtenir ce score ou plus par hasard : ${(tail*100).toFixed(2)} %${tail<.05?' — seuil de 5 % dépassé.':''}`:'Résultat dans ou sous la plage attendue par hasard.'}</p></section><section class="card"><h2>Détail</h2>${data.transmissions.map((t,i)=>`<div class="history">${i+1}. ${esc(data.players.find(p=>p.player_number===t.sender_number).player_name)} → ${esc(data.players.find(p=>p.player_number===t.receiver_number).player_name)}<br>Envoyé : ${t.sent_shape} ${t.sent_color} · Hypothèse : ${t.guessed_shape} ${t.guessed_color} · <strong>${t.success?'réussite':'non'}</strong></div>`).join('')}</section><button class="secondary" id="quit">Retour à l’accueil</button>`;document.querySelector('#quit').onclick=quit}
function binomial(n,k,p){let s=0;for(let i=k;i<=n;i++){let c=1;for(let j=1;j<=i;j++)c*=((n-i+j)/j);s+=c*p**i*(1-p)**(n-i)}return Math.min(1,s)}
function quit(){localStorage.removeItem('telepathie-session');session=null;solo=null;lobby()}
setInterval(()=>session&&!isGuessing&&load(),2500);load();
</script></body></html>
